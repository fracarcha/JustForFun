[CUBEMAP]
; Use 'path' if all cubemap textures are embedded on the same texture. Use 'path[X]' otherwise
;path = MyCubemap.png
pathLeft = park_cube_negx.jpg
pathRight = park_cube_posx.jpg
pathTop = park_cube_posy.jpg
pathBottom = park_cube_negy.jpg
pathFront = park_cube_negz.jpg
pathBack = park_cube_posz.jpg

[CONFIG]
; Wrap options: clamp, repeat, mirror
wrapU = clamp
wrapV = clamp
wrapW = clamp

; filter-min options: nearest, linear, nearest-nearestMip, linear-nearestMip, nearest-linearMip, linear-linearMip
; NOTE: any *Mip option will generate mipmaps automatically
filter-min = linear

; filter-mag options: nearest, linear
filter-mag = linear

; If the cubemap is in sRGB, that is, the artist manually gamma corrected the colors working viewing a monitor, 
; setting to true re-correct sRGB to work in linear space
sRGB = true